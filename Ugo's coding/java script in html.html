<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <style>
        body {
            font-family: "Segoe UI", "Poppins", sans-serif;
            background: linear-gradient(135deg, #ff9ad5, #c77dff);
            padding: 20px;
            text-align: center;
            min-height: 100vh;

            /* center the card nicely */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .weather-app {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .weather-app:hover {
            transform: translateY(-6px);
            box-shadow: 0 22px 55px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: #c21888;
            margin: 0 0 18px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        form {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-top: 8px;
        }

        input {
            padding: 12px 14px;
            width: 100%;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 14px;
            box-shadow: 0 6px 18px rgba(199, 125, 255, 0.28);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        input::placeholder {
            color: rgba(106, 5, 114, 0.55);
        }

        input:focus {
            box-shadow: 0 10px 26px rgba(255, 105, 180, 0.42);
            transform: scale(1.02);
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;

            background: linear-gradient(135deg, #ff4ecd, #a855f7);
            color: white;
            font-weight: 700;
            letter-spacing: 0.2px;

            box-shadow: 0 8px 18px rgba(168, 85, 247, 0.35);
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
            white-space: nowrap;
        }

        /* Hover effect — grows bigger */
        button:hover {
            transform: scale(1.12);
            box-shadow: 0 14px 30px rgba(168, 85, 247, 0.55);
            filter: brightness(1.05);
        }

        /* Click effect */
        button:active {
            transform: scale(0.96);
        }

        .weather-info {
            margin-top: 22px;
            padding: 18px 16px;
            border-radius: 16px;
            background: rgba(255, 240, 250, 0.7);
            box-shadow: inset 0 0 0 1px rgba(194, 24, 136, 0.12);
            color: #6a0572;
            text-shadow: 0 2px 8px rgba(255, 182, 193, 0.35);
        }

        #city-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: #c21888;
            margin: 0 0 8px;
        }

        #temperature,
        #description {
            margin: 6px 0;
            font-size: 1.05rem;
        }
    </style>
</head>

<body>
    <div class="weather-app">
        <h2>Weather App</h2>

        <form id="search-form">
            <input type="search" id="search-input" placeholder="Enter a city…" required autocomplete="off" />
            <button type="submit">Search</button>
        </form>

        <div class="weather-info">
            <h3 id="city-name"></h3>
            <p id="temperature"></p>
            <p id="description"></p>
        </div>
    </div>

    <!-- Axios (needed for API calls) -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        function search(event) {
            event.preventDefault(); // stops page refresh

            const city = document.querySelector("#search-input").value.trim();
            const apiKey = "b63a6a2f48ao0tfdf23944c1c3f5884e"; // your key
            const apiUrl = `https://api.shecodes.io/weather/v1/current?query=${encodeURIComponent(
                city
            )}&key=${apiKey}&units=metric`;

            axios.get(apiUrl).then(showWeather);
        }

        function showWeather(response) {
            document.querySelector("#city-name").innerHTML = response.data.city;
            document.querySelector("#temperature").innerHTML =
                "Temperature: " + Math.round(response.data.temperature.current) + "°C";
            document.querySelector("#description").innerHTML =
                "Conditions: " + response.data.condition.description;
        }

        // Connect the form to the function
        document.querySelector("#search-form").addEventListener("submit", search);
    </script>
</body>

</html>
